<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
    .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 480px; padding: 32px 28px; height: fit-content; }
    h1 { font-size: 1.6rem; color: #1a202c; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .input-row input { flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .input-row input:focus { border-color: #4f7cff; }
    .input-row button { padding: 12px 20px; background: #4f7cff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .input-row button:hover { background: #3563e9; }
    .stats { font-size: 0.85rem; color: #718096; margin-bottom: 16px; }
    .stats span { color: #4f7cff; font-weight: 600; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 12px; padding: 14px 12px; border-radius: 10px; transition: background 0.15s; border-bottom: 1px solid #f0f4f8; }
    li:last-child { border-bottom: none; }
    li:hover { background: #f7fafc; }
    li.checked .item-text { text-decoration: line-through; color: #a0aec0; }
    .checkbox { width: 22px; height: 22px; border: 2px solid #cbd5e0; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    li.checked .checkbox { background: #4f7cff; border-color: #4f7cff; }
    .checkbox svg { display: none; }
    li.checked .checkbox svg { display: block; }
    .item-text { flex: 1; font-size: 1rem; color: #2d3748; cursor: pointer; user-select: none; }
    .delete-btn { background: none; border: none; cursor: pointer; color: #cbd5e0; font-size: 1.2rem; padding: 4px 6px; border-radius: 6px; line-height: 1; transition: color 0.15s, background 0.15s; }
    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }
    .empty { text-align: center; color: #a0aec0; padding: 40px 0; font-size: 0.95rem; }
    .clear-btn { margin-top: 20px; width: 100%; padding: 10px; background: none; border: 2px solid #e2e8f0; border-radius: 10px; color: #718096; font-size: 0.9rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }
    .loading { text-align: center; color: #a0aec0; padding: 20px 0; font-size: 0.9rem; }
    .error-msg { text-align: center; color: #e53e3e; padding: 8px 0; font-size: 0.85rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>
    <div class="error-msg" id="errorMsg" style="display:none;"></div>
    <div class="stats" id="stats"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none;">아직 아이템이 없어요. 추가해 보세요!</div>
    <div class="loading" id="loading">불러오는 중...</div>
    <button class="clear-btn" onclick="clearChecked()">체크된 항목 삭제</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://pfjcbtmyvlzvjquccisw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmamNidG15dmx6dmpxdWNjaXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzg4NjYsImV4cCI6MjA4ODk1NDg2Nn0.DeaasL5C5d6fdC2ffQOCxIVEW7uZs0tk6PmZmTHkXHs';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const loading = document.getElementById('loading');

      loading.style.display = 'none';
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
      } else {
        empty.style.display = 'none';
        const done = items.filter(i => i.checked).length;
        stats.innerHTML = `총 <span>${items.length}</span>개 · 완료 <span>${done}</span>개`;
      }

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');
        li.innerHTML = `
          <div class="checkbox" onclick="toggle('${item.id}')">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="item-text" onclick="toggle('${item.id}')">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem('${item.id}')" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function load() {
      const { data, error } = await db.from('shopping_items').select('*').order('created_at');
      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        document.getElementById('loading').style.display = 'none';
        return;
      }
      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      const { data, error } = await db.from('shopping_items').insert({ text, checked: false }).select().single();
      if (error) { showError('추가 실패: ' + error.message); return; }
      showError('');
      items.push(data);
      input.value = '';
      render();
      input.focus();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await db.from('shopping_items').update({ checked: !item.checked }).eq('id', id);
      if (error) { showError('업데이트 실패: ' + error.message); return; }
      showError('');
      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db.from('shopping_items').delete().eq('id', id);
      if (error) { showError('삭제 실패: ' + error.message); return; }
      showError('');
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;
      const { error } = await db.from('shopping_items').delete().in('id', checkedIds);
      if (error) { showError('삭제 실패: ' + error.message); return; }
      showError('');
      items = items.filter(i => !i.checked);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    load();
  </script>
</body>
</html>
